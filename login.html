<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Sangam</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f0f0f0; }
        .post { background: white; padding: 15px; margin: 15px auto; border-radius: 10px; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .post h3 { margin: 0; color: #FF8C00; }
        .create-post { background: white; padding: 15px; margin: 15px auto; border-radius: 10px; max-width: 500px; }
    </style>
</head>
<body>
    <h1 style="text-align:center; color:#FF8C00;">Sangam Feed</h1>
    
    <div class="create-post">
        <input type="text" placeholder="What's on your mind?">
        <button>Post</button>
    </div>

    <div class="post">
        <h3>Rahul</h3>
        <p>Rewa me aaj ka mausam kitna mast hai! ☀️</p>
    </div>

    <div class="post">
        <h3>Priya</h3>
        <p>New project launch kar diya! Sangam is live 🎉</p>
    </div>
</body>
</html>
